<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Apt Hunter</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #0f3460;
      --green: #25d366;
      --green-dark: #1da851;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --border: #2a2a4a;
      --error: #ff4757;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="password"], input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus, input[type="text"]:focus {
      border-color: #4a4a8a;
    }

    .btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 16px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #4a4acf;
      color: #fff;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .capture-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
      overflow: hidden;
    }

    .capture-zone:hover { border-color: #4a4acf; }
    .capture-zone.has-image { border-style: solid; }

    .capture-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-height: 360px;
    }

    .capture-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .capture-zone.has-image:hover .capture-overlay { opacity: 1; }

    .capture-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .capture-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-analyze {
      background: #4a4acf;
      color: #fff;
      width: 100%;
      padding: 13px;
      font-size: 1rem;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results { display: none; }
    .results.visible { display: block; }

    .listing-grid {
      display: grid;
      gap: 10px;
    }

    .listing-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
    }

    .listing-item-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .listing-item-value {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .phone-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37,211,102,0.12);
      border: 1px solid rgba(37,211,102,0.3);
      color: var(--green);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.9rem;
      font-weight: 500;
      margin: 2px;
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius);
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      transition: background 0.15s, transform 0.1s;
    }

    .wa-btn:hover { background: var(--green-dark); }
    .wa-btn:active { transform: scale(0.98); }

    .wa-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .message-box {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      border-left: 3px solid var(--green);
    }

    .multi-contact {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Multi-number cards */
    .phone-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .phone-card-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .phone-card-number {
      font-size: 1rem;
      font-weight: 600;
      color: var(--green);
    }

    .phone-card-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .phone-card-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .phone-card-btn:hover { background: var(--green-dark); }
    .phone-card-btn:active { transform: scale(0.97); }

    /* Column-layout card (used when CC picker is shown) */
    .phone-card-col {
      flex-direction: column;
      align-items: flex-start;
    }

    /* Country-code picker row */
    .cc-picker-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      width: 100%;
      margin-top: 4px;
    }

    .cc-select {
      background: var(--accent);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 7px 8px;
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
    }

    .cc-other-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 7px 8px;
      width: 72px;
      outline: none;
    }

    .cc-confirm-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 13px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }

    .cc-confirm-btn:hover { background: var(--green-dark); }
    .cc-confirm-btn:active { transform: scale(0.97); }

    .error-box {
      background: rgba(255,71,87,0.1);
      border: 1px solid rgba(255,71,87,0.3);
      border-radius: 8px;
      color: var(--error);
      padding: 12px;
      font-size: 0.88rem;
      display: none;
    }

    .error-box.visible { display: block; }

    /* Hidden file inputs */
    #fileCamera, #fileUpload { display: none; }

    /* Label wrapper so native click reaches the input without JS */
    .capture-label {
      display: block;
      cursor: pointer;
    }
    .capture-label input[type="file"] {
      display: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2a2a4a;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      pointer-events: none;
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 400px) {
      body { padding: 12px; }
      h1 { font-size: 1.3rem; }
    }

    /* ── View tabs ─────────────────────────────────────────────────────────── */
    .view-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
    }

    .view-tab {
      flex: 1;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 9px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .view-tab.active { background: #4a4acf; color: #fff; }

    /* ── Archive view ──────────────────────────────────────────────────────── */
    #archiveView { display: none; }
    #archiveView.visible { display: block; }

    .archive-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 8px;
    }

    .archive-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .btn-csv {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-csv:hover { background: var(--accent); }

    .archive-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 48px 0;
      line-height: 1.8;
    }

    .archive-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .archive-card-top {
      display: flex;
      gap: 12px;
      padding: 12px;
    }

    .archive-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .archive-thumb-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    .archive-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .archive-date { font-size: 0.72rem; color: var(--text-muted); }

    .archive-detail {
      font-size: 0.88rem;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .archive-phones { font-size: 0.8rem; color: var(--green); }

    .archive-contacted { font-size: 0.78rem; color: var(--text-muted); }
    .archive-contacted span { color: var(--text); font-weight: 500; }

    /* Property detail fields grid */
    .archive-fields {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px 10px;
    }

    .archive-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .archive-field.wide {
      grid-column: 1 / -1;
    }

    .archive-field-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .archive-field-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      padding: 5px 8px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      /* remove number spinner arrows for cleanliness */
      -moz-appearance: textfield;
    }

    .archive-field-input[type="number"]::-webkit-inner-spin-button,
    .archive-field-input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .archive-field-input:focus { border-color: #4a4a8a; }

    .archive-card-bottom {
      border-top: 1px solid var(--border);
      padding: 8px 12px 10px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .archive-notes {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 34px;
      line-height: 1.5;
    }

    .archive-notes::placeholder { color: var(--text-muted); }

    .btn-delete {
      background: transparent;
      border: 1px solid rgba(255,71,87,0.3);
      border-radius: 6px;
      color: var(--error);
      font-size: 0.8rem;
      padding: 5px 9px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .btn-delete:hover { background: rgba(255,71,87,0.12); }

    /* ── Bulk upload ─────────────────────────────────── */
    .bulk-drop {
      display: block;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .bulk-drop:hover, .bulk-drop.drag-over { border-color: #4a4acf; }
    .bulk-drop input[type="file"] { display: none; }
    .bulk-drop-hint { color: var(--text-muted); font-size: 0.88rem; margin-top: 6px; }

    .bulk-file-count {
      display: inline-block;
      background: #4a4acf;
      color: #fff;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 8px;
    }

    .btn-bulk-run {
      display: block;
      background: #4a4acf;
      color: #fff;
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .bulk-progress-wrap { margin-top: 12px; display: none; }

    .bulk-progress-bar-track {
      background: var(--surface2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .bulk-progress-bar-fill {
      height: 100%;
      background: #4a4acf;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .bulk-status {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .bulk-file-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 160px;
      overflow-y: auto;
    }

    .bulk-file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 3px 0;
    }

    .bulk-file-item .fi-icon { font-size: 0.9rem; width: 18px; text-align: center; }
    .bulk-file-item .fi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bulk-file-item.fi-ok   .fi-icon { color: var(--green); }
    .bulk-file-item.fi-err  .fi-icon { color: var(--error); }
    .bulk-file-item.fi-pending .fi-icon { color: var(--text-muted); }
    .bulk-file-item.fi-active  .fi-icon { color: #4a4acf; }
  </style>
</head>
<body>

  <h1>🏠 Apt Hunter</h1>
  <p class="subtitle">Fotografía un letrero y genera tu mensaje de WhatsApp al instante.</p>

  <!-- View toggle -->
  <div class="view-tabs">
    <button class="view-tab active" id="tabScan">📷 Escanear</button>
    <button class="view-tab" id="tabArchive">🗂 Archivo</button>
  </div>

  <!-- ── Scan view ──────────────────────────────────────────────────────── -->
  <div id="scanView">

  <!-- API Key -->
  <div class="card">
    <div class="card-label">Anthropic API Key</div>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
      <button class="btn btn-ghost" id="saveKey">Guardar</button>
    </div>
  </div>

  <!-- Photo capture -->
  <div class="card">
    <div class="card-label">Foto del letrero</div>
    <label class="capture-label" id="captureLabel">
      <input type="file" id="fileUpload" accept="image/*">
      <div class="capture-zone" id="captureZone">
        <div class="capture-icon">📷</div>
        <div class="capture-hint">Toca para subir foto</div>
        <div class="capture-overlay">
          <div class="capture-icon">🔄</div>
          <div style="color:#fff;font-size:0.85rem;">Cambiar foto</div>
        </div>
      </div>
    </label>
    <div class="btn-row" style="margin-top:10px;">
      <label class="btn btn-ghost" style="cursor:pointer;">
        <input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none;">
        📷 Cámara
      </label>
      <button class="btn btn-ghost" id="btnClear" style="display:none;">✕ Limpiar</button>
    </div>
  </div>

  <!-- Analyze -->
  <button class="btn btn-analyze" id="btnAnalyze" disabled>Analizar letrero</button>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="results" id="results">

    <div class="card">
      <div class="card-label">Información extraída</div>
      <div class="listing-grid" id="listingGrid"></div>
    </div>

    <div class="card">
      <div class="card-label">Mensaje generado</div>
      <div class="message-box" id="messageBox"></div>
    </div>

    <div class="card">
      <div class="card-label">Abrir en WhatsApp</div>
      <div class="multi-contact" id="contactLinks"></div>
    </div>

  </div>

  <!-- Bulk upload -->
  <div class="card" id="bulkCard" style="margin-top:16px;">
    <div class="card-label">Carga masiva</div>

    <label class="bulk-drop" id="bulkDrop">
      <input type="file" id="bulkInput" accept="image/*" multiple>
      <div style="font-size:1.8rem;">🖼️</div>
      <div class="bulk-drop-hint">Toca para seleccionar varias fotos<br>o arrastra aquí</div>
      <div class="bulk-file-count" id="bulkCount" style="display:none;"></div>
    </label>

    <button class="btn btn-bulk-run" id="btnBulkRun" disabled>Analizar y guardar todas</button>

    <div class="bulk-progress-wrap" id="bulkProgressWrap">
      <div class="bulk-progress-bar-track">
        <div class="bulk-progress-bar-fill" id="bulkProgressFill"></div>
      </div>
      <div class="bulk-status" id="bulkStatus"></div>
      <div class="bulk-file-list" id="bulkFileList"></div>
    </div>
  </div>

  </div><!-- /scanView -->

  <!-- ── Archive view ──────────────────────────────────────────────────── -->
  <div id="archiveView">
    <div class="archive-header">
      <span class="archive-title" id="archiveTitle">Archivo</span>
      <button class="btn-csv" id="btnCsv">⬇ Descargar CSV</button>
    </div>
    <div id="archiveList"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let imageBase64 = null;
  let imageMime = 'image/jpeg';
  let currentResult = null;
  let currentThumbnail = null;

  // ── Elements ───────────────────────────────────────────────────────────────
  const apiKeyEl    = document.getElementById('apiKey');
  const saveKeyBtn  = document.getElementById('saveKey');
  const captureZone = document.getElementById('captureZone');
  const captureLabel= document.getElementById('captureLabel');
  const btnClear    = document.getElementById('btnClear');
  const fileCamera  = document.getElementById('fileCamera');
  const fileUpload  = document.getElementById('fileUpload');
  const btnAnalyze  = document.getElementById('btnAnalyze');
  const errorBox    = document.getElementById('errorBox');
  const resultsEl   = document.getElementById('results');
  const listingGrid = document.getElementById('listingGrid');
  const messageBox  = document.getElementById('messageBox');
  const contactLinks= document.getElementById('contactLinks');
  const toastEl     = document.getElementById('toast');
  const tabScan     = document.getElementById('tabScan');
  const tabArchive  = document.getElementById('tabArchive');
  const scanView    = document.getElementById('scanView');

  // Returns a Promise<dataUrl> for a max-200px-wide thumbnail
  function generateThumbnail(dataUrl) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const MAX_W = 200;
        const scale = Math.min(1, MAX_W / img.width);
        const tc = document.createElement('canvas');
        tc.width  = Math.round(img.width  * scale);
        tc.height = Math.round(img.height * scale);
        tc.getContext('2d').drawImage(img, 0, 0, tc.width, tc.height);
        resolve(tc.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = () => resolve(null);
      img.src = dataUrl;
    });
  }

  // Returns a Promise<string> (dataURL) from a File
  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = e => resolve(e.target.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  // Resizes and compresses a dataURL so it fits within the API's ~5 MB base64 limit.
  // Claude vision works well up to 1568 px on the longest side.
  function compressForApi(dataUrl) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1568;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width  = Math.round(img.width  * scale);
        c.height = Math.round(img.height * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = () => resolve(dataUrl); // fall back to original on error
      img.src = dataUrl;
    });
  }

  // Calls the API and returns the parsed result object. Throws on error.
  async function analyzeImage(base64, mime, apiKey) {
    // Compress before sending — large photos (>~3.75 MB) exceed the API limit
    const compressed = await compressForApi(`data:${mime};base64,${base64}`);
    const commaIdx = compressed.indexOf(',');
    base64 = compressed.slice(commaIdx + 1);
    mime   = 'image/jpeg';
    const payload = {
      model: 'claude-sonnet-4-5',
      max_tokens: 1024,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mime, data: base64 } },
        { type: 'text',  text: 'Analiza este letrero de propiedad y extrae la información solicitada en JSON.' }
      ]}]
    };
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const rawText = data?.content?.[0]?.text || '';
    const jsonMatch = rawText.match(/```json\s*([\s\S]*?)```/) || rawText.match(/```\s*([\s\S]*?)```/);
    const jsonStr = jsonMatch ? jsonMatch[1] : rawText;
    return JSON.parse(jsonStr.trim());
  }

        showError('No se pudo parsear la respuesta de la API. Intenta de nuevo.');
      } else {

      }
    } finally {
      setLoading(false);
    }
  }

  // A file counts as an image if its MIME starts with image/, OR if its MIME is
  // empty/unknown but the extension is a known image format (handles iOS photo
  // picker which sometimes returns type:'' for valid JPEGs).
  const IMAGE_EXTS = /\.(jpe?g|png|gif|webp|heic|heif|bmp|avif|tiff?)$/i;
  function isLikelyImage(f) {
    const t = (f.type || '').toLowerCase();
    if (t.startsWith('image/')) return true;
    if (!t) return IMAGE_EXTS.test(f.name || '');
    return false;
  }

  function updateBulkSelection(files) {
    const all  = Array.from(files);
    const imgs = all.filter(isLikelyImage);
    const skip = all.filter(f => !isLikelyImage(f));
    console.log('[bulk] updateBulkSelection — all:', all.map(f=>({name:f.name,size:f.size,type:f.type})), '| imgs:', imgs.map(f=>f.name), '| skipped:', skip.map(f=>f.name));
    if (!all.length) return;
    bulkFiles = imgs; // store so click handler can access drag-dropped files too
    const total = all.length;
    bulkCount.textContent = `${total} archivo${total !== 1 ? 's' : ''} seleccionado${total !== 1 ? 's' : ''}${skip.length ? ` (${skip.length} no compatibles)` : ''}`;
    bulkCount.style.display = '';
    btnBulkRun.disabled = imgs.length === 0;
    // Render all file rows — images as pending, others as skipped
    bulkFileList.innerHTML = '';
    imgs.forEach(f => {

      const rowId = `bfi-${CSS.escape(f.name + f.size)}`;
      const row = document.getElementById(rowId);

      bulkStatus.textContent = `Analizando ${i + 1} de ${files.length}…`;
      bulkProgressFill.style.width = `${(i / files.length) * 100}%`;

    if (cc) store.set('apt_hunter_last_cc', cc);
  }

  // Build a full phone item (either a big button or a card with optional CC picker)
  function buildPhoneItem(p, waMessage, isSingle) {
    const localDigits = String(p.number || '').replace(/\D/g, '');
    const metaParts   = [p.label, p.position].filter(Boolean);
    const msg         = encodeURIComponent(waMessage);

    // Helper: make the final wa.me anchor
    // skipSave=true when the caller already handles the archive save (CC picker flow)
    function makeWaLink(cc, bigBtn, skipSave = false) {
      const waNum = buildWaNumber(localDigits, cc);
      const href = `https://wa.me/${waNum}?text=${msg}`;
      const a = document.createElement('a');
      a.href = href;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      if (!skipSave) {
        a.addEventListener('click', () => saveToArchive(waNum, p.number));
      }
      if (bigBtn) {
        a.className = 'wa-btn';
        a.innerHTML = `${WA_SVG_LG} WhatsApp · ${escHtml(p.number)}`;
      } else {
        a.className = 'phone-card-btn';
        a.innerHTML = `${WA_SVG_SM} Enviar`;
      }
      return a;
    }

    if (p.countryCode) {
      // Country code known from the sign → show link directly
      if (isSingle) return makeWaLink(p.countryCode, true);
      // Multi-number card
      const card = document.createElement('div');
      card.className = 'phone-card';
      const info = document.createElement('div');
      info.className = 'phone-card-info';
      info.innerHTML = `<div class="phone-card-number">📞 ${escHtml(p.number)}</div>`
        + (metaParts.length ? `<div class="phone-card-meta">${escHtml(metaParts.join(' · '))}</div>` : '');
      card.appendChild(info);
      card.appendChild(makeWaLink(p.countryCode, false));
      return card;
    }

    // No country code detected → show CC picker card
    const defaultCC = getDefaultCC();
    const isCustomCC = defaultCC !== '52' && defaultCC !== '1';

    const card = document.createElement('div');
    card.className = 'phone-card phone-card-col';

    const info = document.createElement('div');
    info.className = 'phone-card-info';
    info.innerHTML = `<div class="phone-card-number">📞 ${escHtml(p.number)}</div>`
      + (metaParts.length ? `<div class="phone-card-meta">${escHtml(metaParts.join(' · '))}</div>` : '')
      + `<div class="phone-card-meta" style="font-style:italic;margin-top:2px;">Selecciona el código de país</div>`;

    // Select element
    const select = document.createElement('select');
    select.className = 'cc-select';
    CC_PRESETS.forEach(({ code, flag, label }) => {
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = `${flag} ${label}`;
      if (code === defaultCC || (isCustomCC && code === 'other')) opt.selected = true;
      select.appendChild(opt);
    });

    // Text input for "Other"
    const otherInput = document.createElement('input');
    otherInput.type = 'text';
    otherInput.className = 'cc-other-input';
    otherInput.placeholder = 'ej. 34';
    otherInput.style.display = isCustomCC ? '' : 'none';
    if (isCustomCC) otherInput.value = defaultCC;

    select.addEventListener('change', () => {
      otherInput.style.display = select.value === 'other' ? '' : 'none';
    });

    // Confirm button
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'cc-confirm-btn';
    confirmBtn.innerHTML = `${WA_SVG_SM} Abrir WhatsApp`;

    confirmBtn.addEventListener('click', () => {
      let cc = select.value;
      if (cc === 'other') {
        cc = otherInput.value.trim().replace(/\D/g, '');
        if (!cc) { showToast('Ingresa un código de país válido'); return; }
      }
      saveCC(cc);
      const waNum = buildWaNumber(localDigits, cc);
      saveToArchive(waNum, p.number);
      // Replace picker row with persistent link (no double-save on re-click)
      const link = makeWaLink(cc, false, true);
      pickerRow.replaceWith(link);
      window.open(link.href, '_blank', 'noopener,noreferrer');
    });

    const pickerRow = document.createElement('div');
    pickerRow.className = 'cc-picker-row';
    pickerRow.appendChild(select);
    pickerRow.appendChild(otherInput);
    pickerRow.appendChild(confirmBtn);

    card.appendChild(info);
    card.appendChild(pickerRow);
    return card;
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function setLoading(on) {
    btnAnalyze.disabled = on;
    btnAnalyze.innerHTML = on
      ? '<span class="spinner"></span>Analizando…'
      : 'Analizar letrero';
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('visible');
  }

  function hideError() {
    errorBox.classList.remove('visible');
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── View toggle ────────────────────────────────────────────────────────────
  tabScan.addEventListener('click', () => {
    tabScan.classList.add('active');
    tabArchive.classList.remove('active');
    scanView.style.display = '';
    archiveView.classList.remove('visible');
  });

  tabArchive.addEventListener('click', () => {
    tabArchive.classList.add('active');
    tabScan.classList.remove('active');
    scanView.style.display = 'none';
    archiveView.classList.add('visible');
    renderArchive();
  });

  btnCsv.addEventListener('click', exportCSV);

  // ── Archive: persistence ────────────────────────────────────────────────────
  function loadArchive() {
    try { return JSON.parse(store.get('apt_hunter_archive') || '[]'); }
    catch { return []; }
  }

  function saveToArchive(waNumber, displayNumber) {
    if (!currentResult) return;
    const archive = loadArchive();
    const entry = {
      id: Date.now(),
      date: new Date().toISOString(),
      thumbnail: currentThumbnail || null,
      address:   currentResult.address || null,
      type:      currentResult.type    || null,
      price:     currentResult.price   || null,
      extras:    currentResult.extras  || null,
      allPhones: (currentResult.phones || []).map(p => p.number || p),
      contactedNumber:  waNumber,
      contactedDisplay: displayNumber,
      whatsappMessage:  currentResult.whatsapp_message || '',
      notes:      '',
      bedrooms:   '',
      bathrooms:  '',
      parking:    '',
      amenities:  ''
    };
    archive.unshift(entry);
    store.set('apt_hunter_archive', JSON.stringify(archive));
    showToast('💾 Guardado en archivo ✓');
  }

  function saveArchiveField(id, key, value) {
    const archive = loadArchive();
    const idx = archive.findIndex(e => e.id === id);
    if (idx !== -1) {
      archive[idx][key] = value;
      store.set('apt_hunter_archive', JSON.stringify(archive));
    }
  }

  function deleteArchiveEntry(id) {
    const archive = loadArchive().filter(e => e.id !== id);
    store.set('apt_hunter_archive', JSON.stringify(archive));
    renderArchive();
  }

  // ── Archive: rendering ──────────────────────────────────────────────────────
  function renderArchive() {
    const archive = loadArchive();
    const count = archive.length;
    archiveTitle.textContent = count
      ? `Archivo · ${count} propiedad${count !== 1 ? 'es' : ''}`
      : 'Archivo';

    if (count === 0) {
      archiveList.innerHTML = '<div class="archive-empty">📭<br>No hay propiedades guardadas aún.<br>Contacta un número para guardar.</div>';
      return;
    }
    archiveList.innerHTML = '';
    archive.forEach(entry => archiveList.appendChild(buildArchiveCard(entry)));
  }

  function buildArchiveCard(entry) {
    const card = document.createElement('div');
    card.className = 'archive-card';

    const dateStr = new Date(entry.date).toLocaleString('es-MX', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    const detailParts = [entry.type, entry.price, entry.address, entry.extras].filter(Boolean);
    const allPhonesStr = (entry.allPhones || []).join(', ');

    // ── Top row ──
    const top = document.createElement('div');
    top.className = 'archive-card-top';

    if (entry.thumbnail) {
      const img = document.createElement('img');
      img.className = 'archive-thumb';
      img.src = entry.thumbnail;
      img.alt = 'Foto';
      top.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'archive-thumb-placeholder';
      ph.textContent = '🏠';
      top.appendChild(ph);
    }

    const info = document.createElement('div');
    info.className = 'archive-info';
    info.innerHTML =
      `<div class="archive-date">${escHtml(dateStr)}</div>`
      + (detailParts.length ? `<div class="archive-detail">${escHtml(detailParts.join(' · '))}</div>` : '')
      + (allPhonesStr ? `<div class="archive-phones">📞 ${escHtml(allPhonesStr)}</div>` : '')
      + `<div class="archive-contacted">Contactado: <span>+${escHtml(String(entry.contactedNumber))}</span></div>`;
    top.appendChild(info);
    card.appendChild(top);

    // ── Property fields ──
    const fieldDefs = [
      { key: 'bedrooms',  label: '# Recámaras',  type: 'number', placeholder: '—' },
      { key: 'bathrooms', label: '# Baños',       type: 'number', placeholder: '—' },
      { key: 'parking',   label: '# Estacion.',   type: 'number', placeholder: '—' },
      { key: 'amenities', label: 'Amenidades',    type: 'text',   placeholder: 'Gym, alberca, roof…', wide: true },
    ];

    const fieldsRow = document.createElement('div');
    fieldsRow.className = 'archive-fields';

    fieldDefs.forEach(({ key, label, type, placeholder, wide }) => {
      const wrap = document.createElement('div');
      wrap.className = 'archive-field' + (wide ? ' wide' : '');

      const lbl = document.createElement('div');
      lbl.className = 'archive-field-label';
      lbl.textContent = label;

      const inp = document.createElement('input');
      inp.type = type;
      inp.className = 'archive-field-input';
      inp.placeholder = placeholder;
      inp.value = entry[key] || '';
      if (type === 'number') inp.min = '0';
      inp.addEventListener('blur', () => saveArchiveField(entry.id, key, inp.value));

      wrap.appendChild(lbl);
      wrap.appendChild(inp);
      fieldsRow.appendChild(wrap);
    });

    card.appendChild(fieldsRow);

    // ── Bottom row: notes + delete ──
    const bottom = document.createElement('div');
    bottom.className = 'archive-card-bottom';

    const textarea = document.createElement('textarea');
    textarea.className = 'archive-notes';
    textarea.placeholder = 'Agregar notas…';
    textarea.value = entry.notes || '';
    textarea.rows = 2;
    textarea.addEventListener('blur', () => saveArchiveField(entry.id, 'notes', textarea.value));

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-delete';
    delBtn.title = 'Eliminar';
    delBtn.textContent = '🗑';
    delBtn.addEventListener('click', () => {
      if (confirm('¿Eliminar esta propiedad del archivo?')) deleteArchiveEntry(entry.id);
    });

    bottom.appendChild(textarea);
    bottom.appendChild(delBtn);
    card.appendChild(bottom);
    return card;
  }

  // ── Archive: CSV export ─────────────────────────────────────────────────────
  function exportCSV() {
    const archive = loadArchive();
    if (!archive.length) { showToast('No hay entradas para exportar'); return; }

    const headers = ['Fecha','Tipo','Dirección/Detalles','Precio','Números encontrados','Número contactado','Recámaras','Baños','Estacionamientos','Amenidades','Notas'];
    const rows = archive.map(e => [
      new Date(e.date).toLocaleString('es-MX'),
      e.type    || '',
      [e.address, e.extras].filter(Boolean).join(' · '),
      e.price   || '',
      (e.allPhones || []).join('; '),
      e.contactedNumber || '',
      e.bedrooms  || '',
      e.bathrooms || '',
      e.parking   || '',
      e.amenities || '',
      e.notes     || ''
    ]);

    const csv = [headers, ...rows]
      .map(row => row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','))
      .join('\r\n');

    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `apt-hunter-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── PWA Service Worker ─────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
